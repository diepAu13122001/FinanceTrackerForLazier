server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Quan trọng: redirect mọi route về index.html
    # Để React Router xử lý routing phía client
    # Không có dòng này: refresh trang /expenses → 404
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets — browser không cần tải lại
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Không cache index.html — để app update được nhận ngay
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Tắt log cho favicon — giảm noise
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    # Giới hạn request size — bảo mật cơ bản
    client_max_body_size 10M;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}